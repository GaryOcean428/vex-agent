name: Deploy Modal Apps

on:
  push:
    branches: [main]
    paths:
      - 'modal/**'
      - 'kernel/llm/client.py'
      - 'kernel/config/settings.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install modal
      # NOTE: vex_inference.py (legacy Ollama-on-Modal) deliberately excluded.
      # It consumed 1 web endpoint and is gated off (MODAL_INFERENCE_ENABLED=false).
      # Total endpoints: vex_coordizer_harvest (3) + vex_qlora_train (5) = 8/8.
      - run: modal deploy modal/vex_coordizer_harvest.py
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      - run: modal deploy modal/vex_qlora_train.py
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
